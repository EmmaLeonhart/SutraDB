name: Publish SDKs

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Python → PyPI ──────────────────────────────────────────────────
  publish-python:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build twine
      - run: python -m build
      - run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ── TypeScript → npm ───────────────────────────────────────────────
  publish-typescript:
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npx tsc
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Rust → crates.io ──────────────────────────────────────────────
  publish-rust:
    name: Publish Rust SDK to crates.io
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ── Java → Maven Central ──────────────────────────────────────────
  publish-java:
    name: Publish Java SDK to Maven Central
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: mvn deploy -q
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}

  # ── .NET → NuGet ──────────────────────────────────────────────────
  publish-dotnet:
    name: Publish .NET SDK to NuGet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/dotnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet pack -c Release
      - run: dotnet nuget push bin/Release/*.nupkg --api-key ${{ secrets.NUGET_TOKEN }} --source https://api.nuget.org/v3/index.json

  # ── Go → tag-based (no publish step needed) ────────────────────────
  # Go modules are published by tagging: git tag sdks/go/v0.1.0
  # No CI action needed — Go module proxy picks it up automatically.
