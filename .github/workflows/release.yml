name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: sutra.exe
            archive: sutra-windows-x64.zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: sutra
            archive: sutra-linux-x64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: sutra
            archive: sutra-macos-arm64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: sutra
            archive: sutra-macos-x64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p sutra-cli

      - name: Package (Windows)
        if: contains(matrix.target, 'windows')
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.archive }} ${{ matrix.artifact }}

      - name: Package (Unix)
        if: "!contains(matrix.target, 'windows')"
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sutra-windows-x64.zip
            sutra-linux-x64.tar.gz
            sutra-macos-arm64.tar.gz
            sutra-macos-x64.tar.gz
          generate_release_notes: true
