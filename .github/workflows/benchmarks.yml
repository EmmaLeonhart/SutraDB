name: Benchmarks

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /home/runner/.cargo
  CARGO_INCREMENTAL: 0

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    # Only run if CI succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # Run all three benchmark suites with bencher output format
      - name: Run sutra-core benchmarks
        run: cargo bench -p sutra-core --bench triple_insert -- --output-format=bencher 2>/dev/null | tee /tmp/bench_core.txt

      - name: Run sutra-hnsw benchmarks
        run: cargo bench -p sutra-hnsw --bench hnsw_search -- --output-format=bencher 2>/dev/null | tee /tmp/bench_hnsw.txt

      - name: Run sutra-sparql benchmarks
        run: cargo bench -p sutra-sparql --bench sparql_query -- --output-format=bencher 2>/dev/null | tee /tmp/bench_sparql.txt

      # Append to history log
      - name: Update benchmark history
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          {
            echo ""
            echo "## ${TIMESTAMP} — \`${COMMIT_SHA}\` ${COMMIT_MSG}"
            echo ""
            echo "### sutra-core (triple store)"
            echo '```'
            grep "^test " /tmp/bench_core.txt || echo "(no output)"
            echo '```'
            echo ""
            echo "### sutra-hnsw (vector index)"
            echo '```'
            grep "^test " /tmp/bench_hnsw.txt || echo "(no output)"
            echo '```'
            echo ""
            echo "### sutra-sparql (query engine)"
            echo '```'
            grep "^test " /tmp/bench_sparql.txt || echo "(no output)"
            echo '```'
          } >> benchmarks/HISTORY.md

      # Overwrite latest summary as a markdown table
      - name: Generate latest benchmark summary
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          COMMIT_SHA=$(git rev-parse --short HEAD)
          OUT=benchmarks/LATEST.md
          echo "# SutraDB — Latest Benchmark Results" > "$OUT"
          echo "" >> "$OUT"
          echo "> Auto-generated by CI. Do not edit manually." >> "$OUT"
          echo "" >> "$OUT"
          echo "**Run:** ${TIMESTAMP} | **Commit:** \`${COMMIT_SHA}\`" >> "$OUT"
          echo "" >> "$OUT"
          for SUITE in core hnsw sparql; do
            case $SUITE in
              core)   LABEL="sutra-core (triple store)";   FILE=/tmp/bench_core.txt ;;
              hnsw)   LABEL="sutra-hnsw (vector index)";   FILE=/tmp/bench_hnsw.txt ;;
              sparql) LABEL="sutra-sparql (query engine)";  FILE=/tmp/bench_sparql.txt ;;
            esac
            echo "## ${LABEL}" >> "$OUT"
            echo "" >> "$OUT"
            echo "| Benchmark | ns/iter | ±variance |" >> "$OUT"
            echo "|-----------|---------|-----------|" >> "$OUT"
            if grep -q "^test " "$FILE"; then
              grep "^test " "$FILE" | sed 's/test \(.*\) \.\.\. bench: *\([0-9,]*\) ns\/iter (+\/- \([0-9,]*\))/| \1 | \2 | \3 |/' >> "$OUT"
            else
              echo "| (no results) | - | - |" >> "$OUT"
            fi
            echo "" >> "$OUT"
          done

      # Commit results back to repo (handles concurrent benchmark runs)
      - name: Commit benchmark results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add benchmarks/HISTORY.md benchmarks/LATEST.md
          git diff --staged --quiet && exit 0
          git commit -m "Update benchmark results [skip ci]"
          # Retry loop: handles race condition with concurrent benchmark runs.
          # On rebase conflict (both runs appended to HISTORY.md), abort rebase,
          # reset to remote, re-run the benchmark append, and try again.
          for i in 1 2 3; do
            if git pull --rebase origin main 2>/dev/null; then
              git push origin main && exit 0
            fi
            echo "Push attempt $i failed (likely rebase conflict), resetting..."
            git rebase --abort 2>/dev/null || true
            git reset --hard origin/main
            # Re-generate and commit (the benchmark data is still in /tmp)
            bash -c 'source /dev/stdin' <<'REGEN'
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          {
            echo ""
            echo "## ${TIMESTAMP} — \`${COMMIT_SHA}\` ${COMMIT_MSG}"
            echo ""
            for SUITE in core hnsw sparql; do
              case $SUITE in
                core)   echo "### sutra-core (triple store)" ;;
                hnsw)   echo "### sutra-hnsw (vector index)" ;;
                sparql) echo "### sutra-sparql (query engine)" ;;
              esac
              echo '```'
              grep "^test " /tmp/bench_${SUITE}.txt 2>/dev/null || echo "(no output)"
              echo '```'
              echo ""
            done
          } >> benchmarks/HISTORY.md
          REGEN
            git add benchmarks/HISTORY.md benchmarks/LATEST.md
            git diff --staged --quiet && exit 0
            git commit -m "Update benchmark results [skip ci]"
            sleep 3
          done
          echo "Failed to push after 3 attempts"
          exit 1
