<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SutraDB Browser</title>
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
            --green: #3fb950; --orange: #d29922; --purple: #bc8cff; --red: #f85149;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        a { color: var(--accent); text-decoration: none; cursor: pointer; }
        a:hover { text-decoration: underline; }

        header {
            padding: 16px 24px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 16px;
        }
        header h1 { font-size: 1.2em; }
        header h1 span { color: var(--accent); }
        #endpoint-input {
            background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
            color: var(--text); padding: 6px 12px; font-size: 0.85em; width: 260px;
        }
        #status { font-size: 0.85em; }
        .connected { color: var(--green); }
        .disconnected { color: var(--red); }

        .layout { display: flex; height: calc(100vh - 57px); }

        .sidebar {
            width: 320px; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.9em; }
        #query-box {
            width: 100%; background: var(--surface); border: none; border-bottom: 1px solid var(--border);
            color: var(--text); padding: 12px 16px; font-family: 'Consolas', monospace; font-size: 0.85em;
            resize: vertical; min-height: 120px;
        }
        .sidebar-actions { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
        .btn {
            padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.85em;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn-primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .btn-primary:hover { background: #79c0ff; }

        .result-list { flex: 1; overflow-y: auto; }
        .result-item {
            padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer;
            font-size: 0.85em;
        }
        .result-item:hover { background: var(--surface); }
        .result-item.active { background: #1c2333; border-left: 3px solid var(--accent); }
        .result-item .subject { color: var(--accent); font-weight: 600; }
        .result-item .predicate { color: var(--purple); }
        .result-item .object { color: var(--green); }
        .result-item .vector-badge {
            display: inline-block; background: #1b2838; color: var(--orange);
            padding: 1px 6px; border-radius: 4px; font-size: 0.8em; margin-left: 4px;
        }

        .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .entity-header {
            padding: 16px 24px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .entity-header h2 { font-size: 1.1em; word-break: break-all; }

        .tabs {
            display: flex; border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 10px 20px; cursor: pointer; font-size: 0.9em;
            border-bottom: 2px solid transparent;
        }
        .tab:hover { background: var(--surface); }
        .tab.active { border-bottom-color: var(--accent); color: var(--accent); }

        .tab-content { flex: 1; overflow-y: auto; padding: 16px 24px; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border); color: var(--muted); font-weight: 600; }
        td { padding: 8px 12px; border-bottom: 1px solid var(--border); word-break: break-all; }
        tr:hover { background: var(--surface); }
        .iri { color: var(--accent); }
        .literal { color: var(--green); }
        .vector-val { color: var(--orange); font-family: monospace; font-size: 0.8em; }

        .stats { padding: 8px 16px; border-top: 1px solid var(--border); font-size: 0.8em; color: var(--muted); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
        .empty-state h3 { margin-bottom: 8px; }

        .quick-queries { padding: 8px 16px; border-bottom: 1px solid var(--border); }
        .quick-queries button {
            background: none; border: 1px solid var(--border); color: var(--muted);
            padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75em; margin: 2px;
        }
        .quick-queries button:hover { color: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

<header>
    <h1><span>Sutra</span>DB Browser</h1>
    <input id="endpoint-input" value="http://localhost:3030" placeholder="SutraDB endpoint">
    <span id="status" class="disconnected">checking...</span>
</header>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-header">SPARQL Query</div>
        <textarea id="query-box">SELECT ?s ?p ?o WHERE {
  ?s ?p ?o
} LIMIT 50</textarea>
        <div class="quick-queries">
            <button onclick="quickQuery('all')">All triples</button>
            <button onclick="quickQuery('types')">All types</button>
            <button onclick="quickQuery('vectors')">Vector triples</button>
            <button onclick="quickQuery('entity')">Entity detail</button>
        </div>
        <div class="sidebar-actions">
            <button class="btn btn-primary" onclick="runQuery()">Run Query</button>
            <button class="btn" onclick="clearResults()">Clear</button>
        </div>
        <div class="result-list" id="result-list"></div>
        <div class="stats" id="stats"></div>
    </div>

    <div class="main-panel">
        <div class="entity-header" id="entity-header" style="display:none;">
            <h2 id="entity-title"></h2>
        </div>
        <div class="tabs" id="tabs" style="display:none;">
            <div class="tab active" onclick="switchTab('outgoing')">Outgoing</div>
            <div class="tab" onclick="switchTab('incoming')">Incoming</div>
            <div class="tab" onclick="switchTab('vectors')">Vectors</div>
        </div>
        <div class="tab-content" id="tab-content">
            <div class="empty-state">
                <h3>Run a SPARQL query to explore</h3>
                <p>Click on any entity IRI to browse its triples and vector connections.</p>
            </div>
        </div>
    </div>
</div>

<script>
const endpoint = () => document.getElementById('endpoint-input').value.replace(/\/$/, '');

async function checkHealth() {
    try {
        const r = await fetch(endpoint() + '/health');
        if (r.ok) {
            document.getElementById('status').textContent = 'connected';
            document.getElementById('status').className = 'connected';
        } else throw new Error();
    } catch {
        document.getElementById('status').textContent = 'disconnected';
        document.getElementById('status').className = 'disconnected';
    }
}

async function sparql(query) {
    const r = await fetch(endpoint() + '/sparql?query=' + encodeURIComponent(query));
    if (!r.ok) throw new Error(await r.text());
    return r.json();
}

function shorten(iri) {
    if (!iri) return '?';
    return iri
        .replace('http://www.w3.org/1999/02/22-rdf-syntax-ns#', 'rdf:')
        .replace('http://www.w3.org/2001/XMLSchema#', 'xsd:')
        .replace('http://www.wikidata.org/entity/', 'wd:')
        .replace('http://www.wikidata.org/prop/direct/', 'wdt:')
        .replace('http://embedding-mapping.local/ontology/', 'emb:')
        .replace('http://stress.sutradb.dev/', 'stress:')
        .replace('http://sutra.dev/', 'sutra:');
}

function isVector(val) {
    return val && (val.includes('sutra:f32vec') || val.includes('f32vec'));
}

function termHtml(binding) {
    if (!binding) return '<span class="literal">?</span>';
    const v = binding.value;
    if (binding.type === 'uri') {
        const short = shorten(v);
        return `<a class="iri" onclick="browseEntity('${v}')">${short}</a>`;
    }
    if (isVector(v)) {
        const preview = v.substring(0, 40) + '...';
        return `<span class="vector-val">${preview}</span>`;
    }
    return `<span class="literal">"${v}"</span>`;
}

let lastResults = null;

async function runQuery() {
    const query = document.getElementById('query-box').value;
    try {
        const data = await sparql(query);
        lastResults = data;
        renderResults(data);
    } catch (e) {
        document.getElementById('result-list').innerHTML =
            `<div class="result-item" style="color:var(--red)">${e.message}</div>`;
    }
}

function renderResults(data) {
    const list = document.getElementById('result-list');
    const bindings = data.results.bindings;
    const vars = data.head.vars;

    if (bindings.length === 0) {
        list.innerHTML = '<div class="result-item" style="color:var(--muted)">No results</div>';
        document.getElementById('stats').textContent = '0 results';
        return;
    }

    // If results have s/p/o, show as triple rows
    const hasSPO = vars.includes('s') && vars.includes('p') && vars.includes('o');

    list.innerHTML = bindings.map((b, i) => {
        if (hasSPO) {
            const hasVec = b.o && isVector(b.o.value);
            return `<div class="result-item" onclick="selectResult(${i})">
                <span class="subject">${shorten(b.s?.value)}</span>
                <span class="predicate"> ${shorten(b.p?.value)} </span>
                <span class="object">${shorten(b.o?.value)?.substring(0, 50)}</span>
                ${hasVec ? '<span class="vector-badge">VEC</span>' : ''}
            </div>`;
        } else {
            const vals = vars.map(v => `<span>${shorten(b[v]?.value)}</span>`).join(' | ');
            return `<div class="result-item" onclick="selectResult(${i})">${vals}</div>`;
        }
    }).join('');

    document.getElementById('stats').textContent = `${bindings.length} results`;
}

function selectResult(idx) {
    document.querySelectorAll('.result-item').forEach((el, i) => {
        el.classList.toggle('active', i === idx);
    });
    const vars = lastResults.head.vars;
    const b = lastResults.results.bindings[idx];
    // Find first URI in the binding to browse
    for (const v of vars) {
        if (b[v]?.type === 'uri') {
            browseEntity(b[v].value);
            return;
        }
    }
}

async function browseEntity(iri) {
    document.getElementById('entity-header').style.display = 'flex';
    document.getElementById('tabs').style.display = 'flex';
    document.getElementById('entity-title').textContent = shorten(iri);

    // Load outgoing triples by default
    switchTab('outgoing', iri);
}

let currentEntity = null;

async function switchTab(tab, iri) {
    if (iri) currentEntity = iri;
    if (!currentEntity) return;

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[onclick*="${tab}"]`)?.classList.add('active');

    const content = document.getElementById('tab-content');
    content.innerHTML = '<div class="empty-state">Loading...</div>';

    try {
        let query, data;
        if (tab === 'outgoing') {
            query = `SELECT ?p ?o WHERE { <${currentEntity}> ?p ?o } LIMIT 200`;
            data = await sparql(query);
            content.innerHTML = renderTripleTable('Predicate', 'Object', data, 'p', 'o');
        } else if (tab === 'incoming') {
            query = `SELECT ?s ?p WHERE { ?s ?p <${currentEntity}> } LIMIT 200`;
            data = await sparql(query);
            content.innerHTML = renderTripleTable('Subject', 'Predicate', data, 's', 'p');
        } else if (tab === 'vectors') {
            // Show vector triples (objects containing f32vec)
            query = `SELECT ?p ?o WHERE { <${currentEntity}> ?p ?o } LIMIT 200`;
            data = await sparql(query);
            const vecBindings = data.results.bindings.filter(b => b.o && isVector(b.o.value));
            const nonVecBindings = data.results.bindings.filter(b => b.o && !isVector(b.o.value));
            let html = '';
            if (vecBindings.length > 0) {
                html += '<h3 style="margin-bottom:12px;color:var(--orange)">Vector Embeddings</h3>';
                html += '<table><tr><th>Predicate</th><th>Vector (preview)</th></tr>';
                vecBindings.forEach(b => {
                    const vec = b.o.value;
                    const nums = vec.replace(/"/g, '').split('^^')[0].trim();
                    const preview = nums.split(' ').slice(0, 8).join(', ') + '...';
                    const dim = nums.split(' ').length;
                    html += `<tr><td>${termHtml(b.p)}</td><td><span class="vector-val">[${preview}] (${dim}-dim)</span></td></tr>`;
                });
                html += '</table>';
            } else {
                html += '<p style="color:var(--muted);margin-bottom:16px;">No vector embeddings on this entity.</p>';
            }
            html += `<h3 style="margin:24px 0 12px;color:var(--accent)">Other Properties (${nonVecBindings.length})</h3>`;
            if (nonVecBindings.length > 0) {
                html += '<table><tr><th>Predicate</th><th>Value</th></tr>';
                nonVecBindings.forEach(b => {
                    html += `<tr><td>${termHtml(b.p)}</td><td>${termHtml(b.o)}</td></tr>`;
                });
                html += '</table>';
            }
            content.innerHTML = html;
        }
    } catch (e) {
        content.innerHTML = `<div class="empty-state" style="color:var(--red)">${e.message}</div>`;
    }
}

function renderTripleTable(col1, col2, data, var1, var2) {
    if (data.results.bindings.length === 0) return '<div class="empty-state">No results</div>';
    let html = `<table><tr><th>${col1}</th><th>${col2}</th></tr>`;
    data.results.bindings.forEach(b => {
        const hasVec = b[var2] && isVector(b[var2]?.value);
        html += `<tr><td>${termHtml(b[var1])}</td><td>${termHtml(b[var2])}${hasVec ? ' <span class="vector-badge">VEC</span>' : ''}</td></tr>`;
    });
    html += '</table>';
    return html;
}

function clearResults() {
    document.getElementById('result-list').innerHTML = '';
    document.getElementById('stats').textContent = '';
    document.getElementById('tab-content').innerHTML = '<div class="empty-state"><h3>Run a SPARQL query to explore</h3></div>';
    document.getElementById('entity-header').style.display = 'none';
    document.getElementById('tabs').style.display = 'none';
}

function quickQuery(type) {
    const box = document.getElementById('query-box');
    const queries = {
        all: 'SELECT ?s ?p ?o WHERE {\n  ?s ?p ?o\n} LIMIT 50',
        types: 'SELECT DISTINCT ?type WHERE {\n  ?s <http://www.w3.org/1999/02/22-rdf-syntax-ns#type> ?type\n} LIMIT 50',
        vectors: 'SELECT ?s ?p ?o WHERE {\n  ?s ?p ?o .\n  FILTER(CONTAINS(STR(?o), "f32vec"))\n} LIMIT 50',
        entity: 'SELECT ?p ?o WHERE {\n  # Replace with an entity IRI:\n  <http://www.wikidata.org/entity/Q8502> ?p ?o\n} LIMIT 50',
    };
    box.value = queries[type] || queries.all;
}

// Keyboard shortcut
document.getElementById('query-box').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { runQuery(); e.preventDefault(); }
});

checkHealth();
setInterval(checkHealth, 10000);
</script>

</body>
</html>
