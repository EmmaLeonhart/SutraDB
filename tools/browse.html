<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SutraDB Browser</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
            --green: #3fb950; --orange: #d29922; --purple: #bc8cff; --red: #f85149;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
        a { color: var(--accent); text-decoration: none; cursor: pointer; }

        header {
            padding: 8px 16px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px; height: 44px;
        }
        header h1 { font-size: 1em; white-space: nowrap; }
        header h1 span { color: var(--accent); }
        header h1::before { content: '\1F4DC '; }
        #endpoint-input {
            background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
            color: var(--text); padding: 4px 8px; font-size: 0.8em; width: 200px;
        }
        #status { font-size: 0.8em; }
        .connected { color: var(--green); }
        .disconnected { color: var(--red); }
        .view-toggle { display: flex; gap: 4px; margin-left: auto; }
        .view-toggle button {
            background: var(--surface); border: 1px solid var(--border); color: var(--muted);
            padding: 4px 12px; cursor: pointer; font-size: 0.8em; border-radius: 4px;
        }
        .view-toggle button.active { color: var(--accent); border-color: var(--accent); }
        .view-toggle button:hover { color: var(--text); }

        .layout { display: flex; height: calc(100vh - 44px); }

        /* Left panel: query + results */
        .panel-left {
            width: 340px; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        #query-box {
            width: 100%; background: var(--surface); border: none; border-bottom: 1px solid var(--border);
            color: var(--text); padding: 8px 12px; font-family: Consolas, monospace; font-size: 0.8em;
            resize: vertical; min-height: 80px; max-height: 200px;
        }
        .query-bar { padding: 6px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; }
        .qbtn {
            background: none; border: 1px solid var(--border); color: var(--muted);
            padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 0.7em;
        }
        .qbtn:hover { color: var(--accent); border-color: var(--accent); }
        .btn-run {
            background: var(--accent); color: var(--bg); border: none;
            padding: 2px 12px; border-radius: 3px; cursor: pointer; font-size: 0.75em; font-weight: 600;
        }

        .result-list { flex: 1; overflow-y: auto; font-size: 0.8em; }
        .result-item {
            padding: 6px 12px; border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .result-item:hover { background: var(--surface); }
        .result-item.active { background: #1c2333; border-left: 3px solid var(--accent); }
        .subject { color: var(--accent); }
        .predicate { color: var(--purple); }
        .object { color: var(--green); }
        .vec-badge {
            display: inline-block; background: #1b2838; color: var(--orange);
            padding: 0 4px; border-radius: 3px; font-size: 0.75em;
        }
        .stats-bar { padding: 4px 12px; border-top: 1px solid var(--border); font-size: 0.75em; color: var(--muted); }

        /* Right panel: detail or graph */
        .panel-right { flex: 1; position: relative; overflow: hidden; }

        /* Graph view */
        #graph-container { width: 100%; height: 100%; }
        #graph-container svg { width: 100%; height: 100%; }

        /* Detail view */
        #detail-panel {
            display: none; position: absolute; top: 0; right: 0; width: 360px; height: 100%;
            background: var(--surface); border-left: 1px solid var(--border);
            overflow-y: auto; z-index: 10;
        }
        #detail-panel .detail-header {
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        #detail-panel .detail-header h3 { font-size: 0.95em; word-break: break-all; }
        #detail-panel .close-btn { cursor: pointer; color: var(--muted); font-size: 1.2em; }
        #detail-panel .detail-content { padding: 12px 16px; font-size: 0.85em; }
        #detail-panel table { width: 100%; }
        #detail-panel th { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); color: var(--muted); font-size: 0.85em; }
        #detail-panel td { padding: 6px 8px; border-bottom: 1px solid var(--border); word-break: break-all; }
        .detail-section { margin-bottom: 16px; }
        .detail-section h4 { color: var(--accent); margin-bottom: 8px; font-size: 0.9em; }

        /* Tooltip */
        .tooltip {
            position: absolute; background: var(--surface); border: 1px solid var(--border);
            border-radius: 4px; padding: 6px 10px; font-size: 0.8em; pointer-events: none;
            z-index: 20; max-width: 300px; word-break: break-all;
        }

        /* SVG styles */
        .link { stroke: var(--border); stroke-width: 1.5; fill: none; }
        .link-label { fill: var(--muted); font-size: 8px; pointer-events: none; }
        .node circle { stroke-width: 2; cursor: pointer; }
        .node text { fill: var(--text); font-size: 9px; pointer-events: none; }
        .node-iri circle { fill: var(--accent); stroke: #1a4a7a; }
        .node-literal circle { fill: var(--green); stroke: #1a3a1f; }
        .node-vector circle { fill: var(--orange); stroke: #3a2e1b; }
        .node.selected circle { stroke: white; stroke-width: 3; }
    </style>
</head>
<body>

<header>
    <h1><span>Sutra</span>DB Browser</h1>
    <input id="endpoint-input" value="http://localhost:3030">
    <span id="status" class="disconnected">...</span>
    <div class="view-toggle">
        <button class="active" onclick="setView('graph')">Graph</button>
        <button onclick="setView('table')">Table</button>
    </div>
</header>

<div class="layout">
    <div class="panel-left">
        <textarea id="query-box">SELECT ?s ?p ?o WHERE {
  ?s ?p ?o
} LIMIT 30</textarea>
        <div class="query-bar">
            <button class="btn-run" onclick="runQuery()">Run (Ctrl+Enter)</button>
            <button class="qbtn" onclick="qk('all')">All</button>
            <button class="qbtn" onclick="qk('types')">Types</button>
            <button class="qbtn" onclick="qk('vectors')">Vectors</button>
            <button class="qbtn" onclick="qk('expand')">Expand</button>
        </div>
        <div class="result-list" id="result-list"></div>
        <div class="stats-bar" id="stats"></div>
    </div>

    <div class="panel-right">
        <div id="graph-container"></div>
        <div id="detail-panel">
            <div class="detail-header">
                <h3 id="detail-title"></h3>
                <span class="close-btn" onclick="closeDetail()">&times;</span>
            </div>
            <div class="detail-content" id="detail-content"></div>
        </div>
    </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
// ── Config ──
const endpoint = () => document.getElementById('endpoint-input').value.replace(/\/$/, '');
let currentView = 'graph';
let graphData = { nodes: [], links: [] };
let simulation = null;
let lastResults = null;

// ── Shorten IRIs ──
function shorten(iri) {
    if (!iri) return '?';
    return iri
        .replace('http://www.w3.org/1999/02/22-rdf-syntax-ns#', 'rdf:')
        .replace('http://www.w3.org/2001/XMLSchema#', 'xsd:')
        .replace('http://www.wikidata.org/entity/', 'wd:')
        .replace('http://www.wikidata.org/prop/direct/', 'wdt:')
        .replace('http://embedding-mapping.local/ontology/', 'emb:')
        .replace('http://stress.sutradb.dev/', 'stress:')
        .replace('http://sutra.dev/', 'sutra:')
        .replace(/^http:\/\/example\.org\//, 'ex:');
}

function isVector(val) { return val && val.includes('f32vec'); }

// ── Health ──
async function checkHealth() {
    try {
        const r = await fetch(endpoint() + '/health');
        document.getElementById('status').textContent = r.ok ? 'connected' : 'error';
        document.getElementById('status').className = r.ok ? 'connected' : 'disconnected';
    } catch {
        document.getElementById('status').textContent = 'disconnected';
        document.getElementById('status').className = 'disconnected';
    }
}

// ── SPARQL ──
async function sparql(query) {
    const r = await fetch(endpoint() + '/sparql?query=' + encodeURIComponent(query));
    if (!r.ok) throw new Error(await r.text());
    return r.json();
}

// ── Quick queries ──
function qk(type) {
    const box = document.getElementById('query-box');
    const q = {
        all: 'SELECT ?s ?p ?o WHERE {\n  ?s ?p ?o\n} LIMIT 30',
        types: 'SELECT DISTINCT ?type WHERE {\n  ?s <http://www.w3.org/1999/02/22-rdf-syntax-ns#type> ?type\n} LIMIT 30',
        vectors: 'SELECT ?s ?p ?o WHERE {\n  ?s ?p ?o\n} LIMIT 50',
        expand: '# Click a node in the graph, then click "Expand" to load its neighbors',
    };
    box.value = q[type] || q.all;
    if (type !== 'expand') runQuery();
}

function expandNode(iri) {
    document.getElementById('query-box').value =
        `SELECT ?s ?p ?o WHERE {\n  { <${iri}> ?p ?o . BIND(<${iri}> AS ?s) }\n  UNION\n  { ?s ?p <${iri}> . BIND(<${iri}> AS ?o) }\n} LIMIT 50`;
    runQuery();
}

// ── Run query ──
async function runQuery() {
    const query = document.getElementById('query-box').value;
    try {
        const data = await sparql(query);
        lastResults = data;
        renderResults(data);
        if (data.head.vars.includes('s') && data.head.vars.includes('p') && data.head.vars.includes('o')) {
            buildGraph(data);
        }
    } catch (e) {
        document.getElementById('result-list').innerHTML =
            `<div class="result-item" style="color:var(--red)">${e.message.substring(0, 200)}</div>`;
    }
}

// ── Render result list ──
function renderResults(data) {
    const list = document.getElementById('result-list');
    const bindings = data.results.bindings;
    const vars = data.head.vars;

    if (!bindings.length) {
        list.innerHTML = '<div class="result-item" style="color:var(--muted)">No results</div>';
        document.getElementById('stats').textContent = '0 results';
        return;
    }

    const hasSPO = vars.includes('s') && vars.includes('p') && vars.includes('o');
    list.innerHTML = bindings.map((b, i) => {
        if (hasSPO) {
            const hasVec = b.o && isVector(b.o.value);
            return `<div class="result-item" onclick="selectResult(${i})">
                <span class="subject">${shorten(b.s?.value)}</span>
                <span class="predicate">${shorten(b.p?.value)}</span>
                <span class="object">${shorten(b.o?.value)?.substring(0, 40)}</span>
                ${hasVec ? '<span class="vec-badge">VEC</span>' : ''}
            </div>`;
        }
        return `<div class="result-item" onclick="selectResult(${i})">${vars.map(v => shorten(b[v]?.value)).join(' | ')}</div>`;
    }).join('');
    document.getElementById('stats').textContent = `${bindings.length} results`;
}

function selectResult(idx) {
    document.querySelectorAll('.result-item').forEach((el, i) => el.classList.toggle('active', i === idx));
    const b = lastResults.results.bindings[idx];
    for (const v of lastResults.head.vars) {
        if (b[v]?.type === 'uri') { showDetail(b[v].value); return; }
    }
}

// ── View toggle ──
function setView(view) {
    currentView = view;
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === view));
    document.getElementById('graph-container').style.display = view === 'graph' ? 'block' : 'none';
}

// ── Build graph from SPO results ──
function buildGraph(data) {
    const nodeMap = new Map();
    const links = [];

    function getNode(binding) {
        if (!binding) return null;
        const id = binding.value;
        if (nodeMap.has(id)) return nodeMap.get(id);
        const isVec = isVector(id);
        const node = {
            id,
            label: shorten(id),
            type: binding.type === 'uri' ? 'iri' : (isVec ? 'vector' : 'literal'),
        };
        nodeMap.set(id, node);
        return node;
    }

    for (const b of data.results.bindings) {
        const s = getNode(b.s);
        const o = getNode(b.o);
        if (s && o) {
            links.push({
                source: s.id,
                target: o.id,
                predicate: shorten(b.p?.value || '?'),
            });
        }
    }

    graphData = { nodes: Array.from(nodeMap.values()), links };
    renderGraph();
}

// ── D3 Force Graph ──
function renderGraph() {
    const container = document.getElementById('graph-container');
    container.innerHTML = '';
    const width = container.clientWidth;
    const height = container.clientHeight;

    const svg = d3.select('#graph-container')
        .append('svg')
        .attr('width', width)
        .attr('height', height);

    // Zoom
    const g = svg.append('g');
    svg.call(d3.zoom().scaleExtent([0.1, 5]).on('zoom', (e) => g.attr('transform', e.transform)));

    // Arrow markers
    svg.append('defs').append('marker')
        .attr('id', 'arrowhead').attr('viewBox', '-0 -5 10 10')
        .attr('refX', 20).attr('refY', 0).attr('orient', 'auto')
        .attr('markerWidth', 6).attr('markerHeight', 6)
        .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', '#30363d');

    // Links
    const link = g.append('g').selectAll('line')
        .data(graphData.links).enter().append('line')
        .attr('class', 'link')
        .attr('marker-end', 'url(#arrowhead)');

    // Link labels
    const linkLabel = g.append('g').selectAll('text')
        .data(graphData.links).enter().append('text')
        .attr('class', 'link-label')
        .text(d => d.predicate);

    // Nodes
    const node = g.append('g').selectAll('g')
        .data(graphData.nodes).enter().append('g')
        .attr('class', d => `node node-${d.type}`)
        .call(d3.drag()
            .on('start', dragStart)
            .on('drag', dragging)
            .on('end', dragEnd));

    node.append('circle')
        .attr('r', d => d.type === 'vector' ? 8 : (d.type === 'literal' ? 6 : 10))
        .on('click', (e, d) => { e.stopPropagation(); showDetail(d.id); })
        .on('dblclick', (e, d) => { e.stopPropagation(); if (d.type === 'iri') expandNode(d.id); })
        .on('mouseover', (e, d) => showTooltip(e, d.id))
        .on('mouseout', hideTooltip);

    node.append('text')
        .attr('dx', 14).attr('dy', 4)
        .text(d => d.label.length > 25 ? d.label.substring(0, 22) + '...' : d.label);

    // Simulation
    simulation = d3.forceSimulation(graphData.nodes)
        .force('link', d3.forceLink(graphData.links).id(d => d.id).distance(100))
        .force('charge', d3.forceManyBody().strength(-200))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collide', d3.forceCollide(25))
        .on('tick', () => {
            link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
            linkLabel
                .attr('x', d => (d.source.x + d.target.x) / 2)
                .attr('y', d => (d.source.y + d.target.y) / 2);
            node.attr('transform', d => `translate(${d.x},${d.y})`);
        });

    function dragStart(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
    function dragging(e, d) { d.fx = e.x; d.fy = e.y; }
    function dragEnd(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
}

// ── Tooltip ──
function showTooltip(event, text) {
    const tt = document.getElementById('tooltip');
    tt.textContent = text;
    tt.style.display = 'block';
    tt.style.left = (event.pageX + 10) + 'px';
    tt.style.top = (event.pageY - 20) + 'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

// ── Detail panel ──
async function showDetail(iri) {
    const panel = document.getElementById('detail-panel');
    const title = document.getElementById('detail-title');
    const content = document.getElementById('detail-content');

    panel.style.display = 'block';
    title.textContent = shorten(iri);
    content.innerHTML = 'Loading...';

    // Highlight in graph
    d3.selectAll('.node').classed('selected', d => d.id === iri);

    try {
        const outgoing = await sparql(`SELECT ?p ?o WHERE { <${iri}> ?p ?o } LIMIT 100`);
        const incoming = await sparql(`SELECT ?s ?p WHERE { ?s ?p <${iri}> } LIMIT 100`);

        let html = '';

        // Separate vectors from other properties
        const vecTriples = outgoing.results.bindings.filter(b => b.o && isVector(b.o.value));
        const otherTriples = outgoing.results.bindings.filter(b => !b.o || !isVector(b.o.value));

        if (vecTriples.length) {
            html += '<div class="detail-section"><h4>Vectors</h4><table>';
            vecTriples.forEach(b => {
                const vec = b.o.value.replace(/"/g, '').split('^^')[0].trim();
                const dims = vec.split(' ').length;
                const preview = vec.split(' ').slice(0, 5).join(', ');
                html += `<tr><td><span class="predicate">${shorten(b.p.value)}</span></td><td><span class="vec-badge">${dims}-dim</span> [${preview}, ...]</td></tr>`;
            });
            html += '</table></div>';
        }

        if (otherTriples.length) {
            html += `<div class="detail-section"><h4>Outgoing (${otherTriples.length})</h4><table>`;
            otherTriples.forEach(b => {
                const oVal = b.o?.type === 'uri'
                    ? `<a onclick="showDetail('${b.o.value}')">${shorten(b.o.value)}</a>`
                    : `<span class="object">"${shorten(b.o?.value)}"</span>`;
                html += `<tr><td><span class="predicate">${shorten(b.p.value)}</span></td><td>${oVal}</td></tr>`;
            });
            html += '</table></div>';
        }

        if (incoming.results.bindings.length) {
            html += `<div class="detail-section"><h4>Incoming (${incoming.results.bindings.length})</h4><table>`;
            incoming.results.bindings.forEach(b => {
                html += `<tr><td><a onclick="showDetail('${b.s.value}')">${shorten(b.s.value)}</a></td><td><span class="predicate">${shorten(b.p.value)}</span></td></tr>`;
            });
            html += '</table></div>';
        }

        if (!html) html = '<p style="color:var(--muted)">No triples found for this entity.</p>';

        html += `<div style="margin-top:16px;"><button class="qbtn" onclick="expandNode('${iri}')">Expand in graph</button></div>`;
        content.innerHTML = html;
    } catch (e) {
        content.innerHTML = `<p style="color:var(--red)">${e.message}</p>`;
    }
}

function closeDetail() {
    document.getElementById('detail-panel').style.display = 'none';
    d3.selectAll('.node').classed('selected', false);
}

// ── Init ──
document.getElementById('query-box').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { runQuery(); e.preventDefault(); }
});
checkHealth();
setInterval(checkHealth, 10000);

// Legend
window.addEventListener('load', () => {
    const c = document.getElementById('graph-container');
    if (c.clientWidth > 0) renderGraph(); // render empty graph
});
</script>
</body>
</html>
